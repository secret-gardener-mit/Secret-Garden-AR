<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#10170f" />
    <title>Secret Garden XR｜秘密花園</title>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
      }
    </script>
    <style>
      :root {
        color-scheme: dark;
        --cream: #fff8ed;
        --leaf: #a8d5a2;
        --glass: rgba(10, 15, 12, 0.7);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #0d140f;
        color: var(--cream);
        font-family: "Noto Serif TC", "PingFang TC", "Microsoft JhengHei", serif;
        touch-action: none;
      }

      #xr-stage,
      #camera-feed {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      #camera-feed {
        z-index: 0;
        display: none;
        object-fit: cover;
        background: #050705;
      }

      #xr-stage {
        z-index: 1;
      }

      .ui {
        position: fixed;
        inset: 0;
        z-index: 2;
        display: grid;
        grid-template-rows: auto 1fr auto;
        pointer-events: none;
        padding: max(16px, env(safe-area-inset-top)) 16px max(16px, env(safe-area-inset-bottom));
      }

      .top,
      .start-panel,
      .hint,
      .debug {
        pointer-events: auto;
      }

      .top {
        display: flex;
        justify-content: space-between;
        align-items: start;
        gap: 12px;
      }

      .brand {
        display: grid;
        gap: 2px;
        text-shadow: 0 2px 18px rgba(0, 0, 0, 0.5);
      }

      .brand strong {
        font-size: 1rem;
      }

      .brand span {
        color: rgba(255, 248, 237, 0.78);
        font: 0.72rem Inter, system-ui, sans-serif;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .debug {
        min-width: 138px;
        padding: 10px 12px;
        border: 1px solid rgba(255, 248, 237, 0.18);
        border-radius: 12px;
        background: var(--glass);
        color: rgba(255, 248, 237, 0.9);
        font: 0.74rem ui-monospace, SFMono-Regular, Menlo, monospace;
        line-height: 1.55;
        backdrop-filter: blur(14px);
      }

      .center {
        display: grid;
        place-items: center;
      }

      .start-panel {
        width: min(88vw, 420px);
        padding: 26px 22px 22px;
        border: 1px solid rgba(255, 248, 237, 0.18);
        border-radius: 22px;
        background: linear-gradient(180deg, rgba(20, 32, 22, 0.86), rgba(14, 22, 17, 0.76));
        text-align: center;
        box-shadow: 0 22px 80px rgba(0, 0, 0, 0.34);
        backdrop-filter: blur(18px);
      }

      .is-running .start-panel {
        display: none;
      }

      .eyebrow {
        margin: 0 0 10px;
        color: var(--leaf);
        font: 700 0.74rem Inter, system-ui, sans-serif;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.1rem, 9vw, 4.2rem);
        line-height: 0.98;
        letter-spacing: 0;
      }

      .start-panel p {
        margin: 16px auto 20px;
        max-width: 21rem;
        color: rgba(255, 248, 237, 0.82);
        line-height: 1.75;
      }

      .start-button {
        width: 100%;
        min-height: 52px;
        border: 0;
        border-radius: 999px;
        background: linear-gradient(135deg, #fff2c7, #f8bfd4 52%, #acd9b2);
        color: #24311e;
        font-size: 1rem;
        font-weight: 800;
      }

      .start-button:disabled {
        opacity: 0.62;
      }

      .status {
        min-height: 1.5em;
        margin-top: 14px;
        color: rgba(255, 248, 237, 0.72);
        font-size: 0.86rem;
        line-height: 1.55;
      }

      .hint {
        justify-self: center;
        width: min(94vw, 540px);
        padding: 12px 16px;
        border: 1px solid rgba(255, 248, 237, 0.2);
        border-radius: 18px;
        background: rgba(10, 15, 12, 0.78);
        color: rgba(255, 248, 237, 0.9);
        text-align: center;
        line-height: 1.6;
        backdrop-filter: blur(16px);
      }
    </style>
  </head>
  <body>
    <video id="camera-feed" autoplay muted playsinline></video>
    <div id="xr-stage"></div>

    <main class="ui" aria-label="Secret Garden XR">
      <header class="top">
        <div class="brand">
          <strong>Secret Garden</strong>
          <span>XR Bloom v0.1a2</span>
        </div>
        <div class="debug" id="debug-panel">
          <div>Plane Found: <span id="debug-plane">No</span></div>
          <div>Flowers: <span id="debug-flowers">0</span></div>
          <div>Petals: <span id="debug-petals">0</span></div>
        </div>
      </header>

      <section class="center">
        <div class="start-panel">
          <p class="eyebrow">WebXR Garden</p>
          <h1>秘密花園</h1>
          <p>支援 WebXR 的裝置會使用地板 hit-test；iPhone Safari 會自動改用相機背景與觸控放置。</p>
          <button class="start-button" id="start-ar" type="button">Start AR</button>
          <div class="status" id="status">請使用 HTTPS 開啟。Android Chrome 可進入 WebXR；iPhone Safari 會使用相機 fallback。</div>
        </div>
      </section>

      <aside class="hint" id="hint">Start AR</aside>
    </main>

    <script type="module" src="ar/webxr-scene.js?v=20260616-v0.1a2"></script>
  </body>
</html>
