<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#10170f" />
    <title>秘密花園 AR 開花體驗｜Secret Garden</title>
    <meta
      name="description"
      content="Secret Garden 秘密花園演出現場 WebAR 開花體驗。請用手機掃描秘密花園 AR 定位圖卡。"
    />
    <link rel="icon" type="image/png" href="assets/favicon-secret-garden-max.png?v=20260603-01" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
          "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
        }
      }
    </script>
    <style>
      :root {
        color-scheme: dark;
        --leaf: #a8d5a2;
        --petal: #ffd7e6;
        --cream: #fff8ed;
        --ink: #f7f3e9;
        --glass: rgba(12, 18, 14, 0.58);
        --glass-strong: rgba(12, 18, 14, 0.82);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #0f160f;
        color: var(--ink);
        font-family: "Noto Serif TC", "PingFang TC", "Microsoft JhengHei", serif;
        touch-action: none;
      }

      body::before {
        position: fixed;
        inset: 0;
        z-index: 0;
        content: "";
        background:
          linear-gradient(180deg, rgba(8, 16, 13, 0.38), rgba(8, 16, 13, 0.84)),
          url("ar/assets/secret-garden-venue.jpg") center / cover;
        filter: saturate(0.9) brightness(0.74);
        transform: scale(1.03);
      }

      #ar-container {
        position: fixed;
        inset: 0;
        z-index: 1;
      }

      .ar-shell {
        position: fixed;
        inset: 0;
        z-index: 3;
        display: grid;
        grid-template-rows: auto 1fr auto;
        pointer-events: none;
        padding: max(18px, env(safe-area-inset-top)) 18px max(18px, env(safe-area-inset-bottom));
      }

      .top-bar,
      .bottom-panel,
      .start-card {
        pointer-events: auto;
      }

      .top-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: var(--cream);
        text-decoration: none;
        text-shadow: 0 2px 18px rgba(0, 0, 0, 0.35);
      }

      .brand img {
        width: 38px;
        height: 38px;
        object-fit: contain;
      }

      .brand span {
        display: grid;
        gap: 1px;
        font-size: 0.82rem;
        letter-spacing: 0;
      }

      .brand strong {
        font-size: 1.02rem;
        font-weight: 700;
      }

      .history-link,
      .stop-button {
        min-height: 42px;
        border: 1px solid rgba(255, 248, 237, 0.28);
        border-radius: 999px;
        background: var(--glass);
        color: var(--cream);
        text-decoration: none;
        backdrop-filter: blur(14px);
      }

      .history-link {
        display: inline-flex;
        align-items: center;
        padding: 0 14px;
        font-size: 0.86rem;
      }

      .stop-button {
        display: none;
        width: 42px;
        padding: 0;
        font-size: 1.35rem;
        line-height: 1;
      }

      .is-running .stop-button {
        display: inline-grid;
        place-items: center;
      }

      .center-stage {
        display: grid;
        place-items: center;
        min-height: 0;
      }

      .start-card {
        width: min(88vw, 420px);
        padding: 26px 22px 22px;
        border: 1px solid rgba(255, 248, 237, 0.18);
        border-radius: 22px;
        background: linear-gradient(180deg, rgba(20, 32, 22, 0.82), rgba(14, 22, 17, 0.72));
        box-shadow: 0 22px 80px rgba(0, 0, 0, 0.34);
        text-align: center;
        backdrop-filter: blur(18px);
      }

      .is-running .start-card {
        display: none;
      }

      .eyebrow {
        margin: 0 0 10px;
        color: var(--leaf);
        font-family: Inter, system-ui, sans-serif;
        font-size: 0.74rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.2rem, 10vw, 4.2rem);
        line-height: 0.95;
        letter-spacing: 0;
      }

      .start-card p {
        margin: 16px auto 20px;
        max-width: 20rem;
        color: rgba(255, 248, 237, 0.84);
        font-size: 0.98rem;
        line-height: 1.8;
      }

      .start-button {
        width: 100%;
        min-height: 52px;
        border: 0;
        border-radius: 999px;
        background: linear-gradient(135deg, #fff2c7, #f8bfd4 52%, #acd9b2);
        color: #24311e;
        font-size: 1rem;
        font-weight: 700;
        box-shadow: 0 12px 34px rgba(255, 215, 230, 0.26);
      }

      .start-button:disabled {
        opacity: 0.62;
      }

      .status {
        min-height: 1.5em;
        margin-top: 14px;
        color: rgba(255, 248, 237, 0.76);
        font-size: 0.86rem;
        line-height: 1.5;
      }

      .bottom-panel {
        justify-self: center;
        width: min(94vw, 520px);
        padding: 12px 16px;
        border: 1px solid rgba(255, 248, 237, 0.2);
        border-radius: 18px;
        background: var(--glass-strong);
        color: rgba(255, 248, 237, 0.88);
        font-size: 0.9rem;
        line-height: 1.55;
        text-align: center;
        backdrop-filter: blur(16px);
      }

      .target-frame {
        position: fixed;
        top: 50%;
        left: 50%;
        z-index: 2;
        width: min(64vw, 280px);
        aspect-ratio: 1.42;
        border: 2px solid rgba(255, 248, 237, 0.76);
        border-radius: 16px;
        opacity: 0;
        pointer-events: none;
        transform: translate(-50%, -50%);
        transition: opacity 0.3s ease;
      }

      .is-running .target-frame {
        opacity: 0.68;
      }

      .is-tracking .target-frame {
        opacity: 0;
      }

      @media (max-width: 520px) {
        .ar-shell {
          padding-right: 14px;
          padding-left: 14px;
        }

        .brand strong {
          font-size: 0.94rem;
        }

        .history-link {
          padding: 0 12px;
          font-size: 0.78rem;
        }

        .bottom-panel {
          font-size: 0.84rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="ar-container" aria-hidden="true"></div>
    <div class="target-frame" aria-hidden="true"></div>

    <main class="ar-shell" aria-label="秘密花園 AR 開花體驗">
      <header class="top-bar">
        <a class="brand" href="index.html" aria-label="回到秘密花園網站">
          <img src="assets/secret-garden-logo-cropped.png" alt="" />
          <span><strong>Secret Garden</strong>AR Bloom</span>
        </a>
        <a class="history-link" href="ar/version.html">版本紀錄</a>
        <button class="stop-button" id="stop-ar" type="button" aria-label="停止 AR">×</button>
      </header>

      <section class="center-stage">
        <div class="start-card">
          <p class="eyebrow">WebAR Experience</p>
          <h1>秘密花園</h1>
          <p>請用手機開啟此頁，允許相機後，對準演出現場的秘密花園 AR 定位圖卡。</p>
          <button class="start-button" id="start-ar" type="button">開始 AR 開花</button>
          <div class="status" id="ar-status" role="status">建議使用 Safari 或 Chrome，並以 HTTPS 開啟。</div>
        </div>
      </section>

      <aside class="bottom-panel" id="scan-hint">請對準秘密花園圖卡。辨識成功後，花瓣會在鋼琴上方落下，花朵會從周圍慢慢長出。</aside>
    </main>

    <script type="module" src="ar/ar-scene.js?v=20260615-ar4"></script>
  </body>
</html>
