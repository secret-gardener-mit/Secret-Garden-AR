<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
      "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
    }
  }
  </script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    #container {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    #control {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
    }

    #status {
      position: fixed;
      right: 12px;
      bottom: 12px;
      left: 12px;
      z-index: 10;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      font: 14px system-ui, sans-serif;
    }

    button {
      font-size: 18px;
      padding: 10px 14px;
    }
  </style>
</head>

<body>
  <div id="control">
    <button id="startButton">Start Red AR</button>
    <button id="stopButton">Stop</button>
  </div>

  <div id="container"></div>
  <div id="status">Ready: ./ar/Red.mind</div>

  <script type="module">
    import * as THREE from "three";
    import { MindARThree } from "mindar-image-three";

    const status = document.querySelector("#status");

    const mindarThree = new MindARThree({
      container: document.querySelector("#container"),
      imageTargetSrc: "./ar/Red.mind"
    });

    const { renderer, scene, camera } = mindarThree;
    const anchor = mindarThree.addAnchor(0);

    anchor.onTargetFound = () => {
      console.log("✅ RED TARGET FOUND");
      status.textContent = "RED TARGET FOUND";
      status.style.background = "rgba(210, 20, 20, 0.86)";
    };

    anchor.onTargetLost = () => {
      console.log("RED TARGET LOST");
      status.textContent = "RED TARGET LOST";
      status.style.background = "rgba(0, 0, 0, 0.7)";
    };

    const plane = new THREE.Mesh(
      new THREE.PlaneGeometry(1, 1),
      new THREE.MeshBasicMaterial({
        color: 0xff0000,
        transparent: true,
        opacity: 0.8,
        side: THREE.DoubleSide
      })
    );

    anchor.group.add(plane);

    document.querySelector("#startButton").addEventListener("click", async () => {
      console.log("Starting Red MindAR...");
      status.textContent = "Starting Red MindAR...";
      await mindarThree.start();
      console.log("Red MindAR started");
      status.textContent = "Red MindAR started. Scan Red target.";

      renderer.setAnimationLoop(() => {
        renderer.render(scene, camera);
      });
    });

    document.querySelector("#stopButton").addEventListener("click", () => {
      mindarThree.stop();
      renderer.setAnimationLoop(null);
      status.textContent = "Stopped";
    });
  </script>
</body>
</html>
